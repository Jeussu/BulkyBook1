<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" role="img" aria-label="Clean Architecture with .NET book cover">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#352f2e"/>
      <stop offset="1" stop-color="#a97526"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f2eadb"/>
    </linearGradient>
    <pattern id="paperGrain" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M0 21h22M21 0v22" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="300" height="400" rx="12" fill="url(#cover)"/>
  <rect width="300" height="400" fill="url(#paperGrain)"/>
  <path d="M25 0h17v400H25z" fill="#000" opacity="0.15"/>
  <path d="M42 0h1.5v400H42z" fill="#fff" opacity="0.20"/>
  <text x="58" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="800" letter-spacing="1.3" fill="#ffffff" opacity="0.84">BULKYBOOK PRESS</text>
  <rect x="58" y="51" width="184" height="24" rx="12" fill="#ffffff" opacity="0.12"/>
  <text x="150" y="67" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" font-weight="800" letter-spacing="1" fill="#ffe6ad">ARCHITECTURE</text>
  <rect x="44" y="88" width="212" height="104" rx="10" fill="url(#panel)" filter="url(#panelShadow)"/>
  <path d="M62 105h176" stroke="#151923" stroke-opacity="0.08" stroke-width="1"/>
    <text text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#151923">
      <tspan x="150" y="107">Clean</tspan>
      <tspan x="150" y="130">Architecture</tspan>
      <tspan x="150" y="153">with .NET</tspan>
    </text>  <text x="150" y="178" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="650" fill="#5f6672">Boundaries and testable code</text>
  <g opacity="0.84">
      <path d="M112 242l38-28 38 28v56l-38 28-38-28z" fill="none" stroke="#ffe6ad" stroke-width="6" stroke-linejoin="round"/>
      <path d="M112 242l38 28 38-28M150 270v56" stroke="#ffe6ad" stroke-width="4" stroke-linecap="round" opacity=".72"/>  </g>
  <path d="M58 345h184" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>
  <text x="58" y="369" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" fill="#ffffff">Marcus Reed</text>
  <text x="242" y="369" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="800" letter-spacing="1.2" fill="#ffffff" opacity="0.66">TECH SERIES</text>
</svg>
